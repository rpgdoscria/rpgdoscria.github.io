name = "rpg-wiki-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Ajuste para o seu domínio real do GitHub Pages.
# Pode ser sobrescrito por variável de ambiente CORS_ORIGIN em produção.
# NUNCA use "*" em produção — apenas em `wrangler dev` local.
[vars]
CORS_ORIGIN = "http://localhost:8000"
PAGES_ORIGIN = "https://rpgdoscria.github.io"
JWT_TTL_DAYS = "7"
RATE_LIMIT_MAX_FAILS = "5"
RATE_LIMIT_WINDOW_MIN = "15"
# Cloudinary — cloud name é público (visível no dashboard). API key/secret vão
# como `wrangler secret put` (não coloque aqui).
CLOUDINARY_CLOUD_NAME = "mlaxyiv7"

# D1 — bind do banco
[[d1_databases]]
binding = "DB"
database_name = "rpg-wiki-db"
database_id = "d921d3fc-2c08-41a2-9461-98387a7845fd"
migrations_dir = "src/migrations"

# NOTA: R2 removido — exigia cartão de crédito mesmo no free tier.
# Imagens agora vão para Cloudinary (25GB free, sem cartão, com CDN global).
# Setup: crie conta free em cloudinary.com e defina os secrets:
#   wrangler secret put CLOUDINARY_API_KEY
#   wrangler secret put CLOUDINARY_API_SECRET

# Durable Objects — Sala de Jogo em Tempo Real
# Cada sala vira uma instância isolada do RoomDO, identificada pelo código da sala.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

# Migration necessária para registrar a classe do Durable Object.
# Aplica automaticamente quando você roda `wrangler deploy` pela primeira vez.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]
