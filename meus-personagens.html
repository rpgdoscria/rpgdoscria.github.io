<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus personagens — Crônicas RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme-custom.css">
</head>
<body>
  <div id="header-mount"></div>

  <main class="container wide">
    <div class="flex items-center justify-between mb-4">
      <h1 style="font-family: var(--font-serif); font-size: 28px; margin: 0;">Meus personagens</h1>
      <a class="btn btn-primary" href="criar-personagem.html">+ Novo personagem</a>
    </div>

    <div id="alert-mount"></div>

    <div id="chars-list" class="characters-grid">
      <div class="muted text-sm">Carregando…</div>
    </div>
  </main>

  <script src="vendor/purify.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/character-render.js"></script>
  <script>
    (async function () {
      window.auth.mountHeader("#header-mount", "characters");
      const sess = window.auth.requireAuth("viewer");
      if (!sess) return;

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
      }
      function showAlert(type, msg) {
        document.getElementById("alert-mount").innerHTML = `<div class="alert alert-${type}">${escapeHtml(msg)}</div>`;
      }

      async function load() {
        try {
          const data = await window.api.get("/api/characters");
          const list = document.getElementById("chars-list");
          if (!data.characters || data.characters.length === 0) {
            list.innerHTML = `
              <div class="card" style="grid-column:1/-1">
                <div style="text-align:center;padding:32px">
                  <div style="font-size:48px;margin-bottom:16px">🧙</div>
                  <h3 style="margin:0 0 8px 0">Você ainda não tem personagens</h3>
                  <p class="muted text-sm mb-4">Crie seu primeiro personagem pra usar nas salas de jogo.</p>
                  <a class="btn btn-primary" href="criar-personagem.html">+ Criar primeiro personagem</a>
                </div>
              </div>`;
            return;
          }
          list.innerHTML = data.characters.map(ch => `
            <div class="card" style="padding:16px;display:flex;flex-direction:column;gap:8px">
              <div style="display:flex;gap:12px;align-items:center">
                ${window.characterRender.renderAvatar(ch, 64)}
                <div style="flex:1">
                  <div style="font-weight:700;font-family:var(--font-serif);font-size:18px">${escapeHtml(ch.name)}</div>
                  <div class="muted text-xs">${ch.isActive ? "⭐ ativo" : ""}</div>
                </div>
              </div>
              <div class="text-xs muted">${(ch.stats || []).length} status · ${(ch.inventory || []).length} itens</div>
              <div class="flex gap-2 flex-wrap" style="margin-top:8px">
                <a class="btn btn-sm btn-primary" href="criar-personagem.html?id=${ch.id}">Editar</a>
                ${!ch.isActive ? `<button class="btn btn-sm" data-activate="${ch.id}">Ativar</button>` : ""}
                <button class="btn btn-sm btn-danger" data-del="${ch.id}">Apagar</button>
              </div>
            </div>
          `).join("");
          list.querySelectorAll('button[data-activate]').forEach(b => {
            b.addEventListener("click", async () => {
              try { await window.api.post(`/api/characters/${b.dataset.activate}/activate`, {}); load(); }
              catch (e) { alert(e.message); }
            });
          });
          list.querySelectorAll('button[data-del]').forEach(b => {
            b.addEventListener("click", async () => {
              if (!confirm("Apagar este personagem? Não dá pra desfazer.")) return;
              try { await window.api.del(`/api/characters/${b.dataset.del}`); load(); }
              catch (e) { alert(e.message); }
            });
          });
        } catch (e) {
          showAlert("error", e.message);
        }
      }
      load();
    })();
  </script>
</body>
</html>
