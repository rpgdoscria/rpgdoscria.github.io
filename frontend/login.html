<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Crônicas RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme-custom.css">
</head>
<body>
  <div id="header-mount"></div>

  <main class="login-wrap">
    <div class="login-card">
      <h1>Entrar na wiki</h1>
      <p class="subtitle">Acesso restrito ao grupo da campanha.</p>

      <div id="alert-mount"></div>

      <form id="login-form">
        <div class="field">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;" id="login-btn">
          Entrar
        </button>
      </form>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      window.auth.mountHeader("#header-mount");

      // Se já está logado, vai embora.
      if (window.auth.currentSession()) {
        window.auth.redirectToNext();
        return;
      }

      const form = document.getElementById("login-form");
      const btn = document.getElementById("login-btn");
      const alertMount = document.getElementById("alert-mount");

      function showAlert(type, msg) {
        alertMount.innerHTML = `<div class="alert alert-${type}">${escapeHtml(msg)}</div>`;
      }
      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        if (!username || !password) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Entrando…';
        try {
          await window.auth.login(username, password);
          showAlert("success", "Login OK! Redirecionando…");
          setTimeout(() => window.auth.redirectToNext(), 200);
        } catch (err) {
          showAlert("error", err.message || "Falha ao entrar.");
          btn.disabled = false;
          btn.textContent = "Entrar";
        }
      });
    })();
  </script>
</body>
</html>
