<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trocar senha — Rpg dos Cria</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/style.css?v=202607232121">
  <link rel="stylesheet" href="css/theme-custom.css?v=202607232121">
</head>
<body>
  <div id="header-mount"></div>

  <main class="login-wrap">
    <div class="login-card">
      <h1>Trocar senha</h1>
      <p class="subtitle">Um administrador resetou sua senha. Por favor, escolha uma nova.</p>

      <div id="alert-mount"></div>

      <form id="change-form">
        <div class="field">
          <label for="current">Senha atual (a temporária)</label>
          <input type="password" id="current" autocomplete="current-password" required>
        </div>
        <div class="field">
          <label for="new">Nova senha (mín. 8 caracteres)</label>
          <input type="password" id="new" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="field">
          <label for="confirm">Confirmar nova senha</label>
          <input type="password" id="confirm" autocomplete="new-password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;" id="btn-submit">
          Trocar senha
        </button>
      </form>
    </div>
  </main>

  <script src="js/config.js?v=202607232121"></script>
  <script src="js/api.js?v=202607232121"></script>
  <script src="js/auth.js?v=202607232121"></script>
  <script>
    (function () {
      window.auth.mountHeader("#header-mount");
      const sess = window.auth.requireAuth("viewer");
      if (!sess) return;

      const alertMount = document.getElementById("alert-mount");
      const btn = document.getElementById("btn-submit");
      function showAlert(type, msg) {
        alertMount.innerHTML = `<div class="alert alert-${type}">${escapeHtml(msg)}</div>`;
      }
      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
      }

      document.getElementById("change-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const currentPassword = document.getElementById("current").value;
        const newPassword = document.getElementById("new").value;
        const confirm = document.getElementById("confirm").value;
        if (newPassword !== confirm) {
          showAlert("error", "A nova senha e a confirmação não batem.");
          return;
        }
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Trocando…';
        try {
          await window.api.post("/api/auth/change-password", { currentPassword, newPassword });
          // Atualiza sessão local
          const user = window.api.getUser();
          if (user) {
            user.mustChangePassword = false;
            window.api.setUser(user);
          }
          showAlert("success", "Senha trocada! Redirecionando…");
          setTimeout(() => { location.href = "index.html"; }, 600);
        } catch (err) {
          showAlert("error", err.message);
          btn.disabled = false;
          btn.textContent = "Trocar senha";
        }
      });
    })();
  </script>
</body>
</html>
