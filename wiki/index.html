<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki — Rpg dos Cria</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=202607232121">
  <link rel="stylesheet" href="../css/theme-custom.css?v=202607232121">
  <link rel="stylesheet" href="css/wiki-style.css?v=202607232121">
</head>
<body>
  <div id="header-mount"></div>

  <!-- Botão hambúrguer (só visível em mobile) -->
  <button class="wiki-sidebar-toggle" id="sidebar-toggle">☰ Menu</button>

  <div class="wiki-layout">
    <!-- SIDEBAR (fixa à esquerda, 240px) -->
    <aside class="wiki-sidebar" id="wiki-sidebar">
      <!-- Busca sempre visível no topo da sidebar -->
      <div class="wiki-sidebar-search">
        <input type="search" id="wiki-search" placeholder="🔍 Buscar na wiki…" autocomplete="off">
      </div>

      <!-- Botão Nova página (editores+) -->
      <a href="editar.html?new=true" class="btn btn-primary btn-sm wiki-sidebar-new-btn" id="btn-new-page">+ Nova página</a>

      <!-- Categorias como links clicáveis (substitui cards + botões redundantes) -->
      <div class="wiki-sidebar-section">
        <div class="wiki-sidebar-section-title">Categorias</div>
        <div id="sidebar-categories"></div>
      </div>

      <!-- Últimas alterações (compacto, últimas 5) -->
      <div class="wiki-sidebar-section">
        <div class="wiki-sidebar-section-title">Últimas alterações</div>
        <div id="sidebar-recent"></div>
      </div>
    </aside>

    <!-- Overlay para fechar sidebar no mobile -->
    <div class="wiki-sidebar-overlay" id="sidebar-overlay"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="wiki-content">
      <div class="wiki-content-header">
        <h1 id="content-title" style="font-family: var(--font-serif); font-size: 28px; margin: 0;">Todas as páginas</h1>
        <span id="content-count" class="muted text-sm"></span>
      </div>

      <!-- Resultados de busca (quando aplicável) -->
      <div id="search-results" class="hidden mb-4">
        <div id="search-results-list"></div>
      </div>

      <!-- Lista de páginas (sempre visível, filtrada por categoria via JS) -->
      <div id="pages-list" class="card">
        <div class="muted text-sm" style="padding: var(--space-3)">Carregando…</div>
      </div>
    </main>
  </div>

  <script src="../vendor/marked.min.js"></script>
  <script src="../vendor/purify.min.js"></script>
  <script src="../js/config.js?v=202607232121"></script>
  <script src="../js/api.js?v=202607232121"></script>
  <script src="../js/auth.js?v=202607232121"></script>
  <script src="../js/markdown.js?v=202607232121"></script>
  <script src="../js/wiki/wiki-core.js?v=202607232121"></script>
  <script>
    (async function () {
      window.auth.mountHeader("#header-mount", "wiki");
      const sess = window.auth.currentSession();
      if (!sess) {
        const next = encodeURIComponent(location.pathname + location.search);
        location.href = `../login.html?next=${next}`;
        return;
      }
      if (sess.user.role === "viewer") {
        document.getElementById("btn-new-page").classList.add("hidden");
      }

      const params = new URLSearchParams(location.search);
      const q = params.get("q");
      let allPages = [];
      let activeCategory = params.get("category") || "";

      // ---- Toggle sidebar (mobile) ----
      const sidebar = document.getElementById("wiki-sidebar");
      const overlay = document.getElementById("sidebar-overlay");
      document.getElementById("sidebar-toggle").addEventListener("click", () => {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("show");
      });
      overlay.addEventListener("click", () => {
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
      });

      // ---- Busca (Enter dispara) ----
      const searchInput = document.getElementById("wiki-search");
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const val = searchInput.value.trim();
          if (val) location.href = `index.html?q=${encodeURIComponent(val)}`;
          else location.href = "index.html";
        }
      });
      if (q) searchInput.value = q;

      // ---- Carrega dados da API ----
      try {
        const url = q ? `/api/pages?q=${encodeURIComponent(q)}` : `/api/pages`;
        const data = await window.api.get(url);
        allPages = data.pages || [];
        const cats = data.categories || [];
        const recent = data.recent || [];

        // ===== SIDEBAR: Categorias como links =====
        const catCounts = {};
        allPages.forEach(p => { catCounts[p.category] = (catCounts[p.category] || 0) + 1; });

        const catLinks = document.getElementById("sidebar-categories");
        let catHtml = `<a class="wiki-sidebar-cat-link ${!activeCategory ? "active" : ""}" data-cat="">Todas as páginas <span class="count">${allPages.length}</span></a>`;
        cats.forEach(c => {
          catHtml += `<a class="wiki-sidebar-cat-link ${activeCategory === c ? "active" : ""}" data-cat="${wikiCore.escapeHtml(c)}">${wikiCore.escapeHtml(c)} <span class="count">${catCounts[c] || 0}</span></a>`;
        });
        catLinks.innerHTML = catHtml;

        // Clique em categoria filtra instantaneamente (sem reload de página)
        catLinks.querySelectorAll(".wiki-sidebar-cat-link").forEach(link => {
          link.addEventListener("click", (e) => {
            e.preventDefault();
            activeCategory = link.dataset.cat;
            // Atualiza URL sem reload
            const u = new URL(location.href);
            if (activeCategory) u.searchParams.set("category", activeCategory);
            else u.searchParams.delete("category");
            u.searchParams.delete("q");
            history.replaceState(null, "", u.toString());
            // Atualiza destaque visual
            catLinks.querySelectorAll(".wiki-sidebar-cat-link").forEach(l => l.classList.remove("active"));
            link.classList.add("active");
            // Re-renderiza lista
            renderPages();
            // Fecha sidebar no mobile
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
          });
        });

        // ===== SIDEBAR: Últimas alterações (compacto, 5 itens) =====
        const recentEl = document.getElementById("sidebar-recent");
        if (recent.length === 0) {
          recentEl.innerHTML = `<div class="wiki-sidebar-recent-empty">Nenhuma edição ainda.</div>`;
        } else {
          recentEl.innerHTML = recent.slice(0, 5).map(r => `
            <a class="wiki-sidebar-recent-item" href="${wikiCore.pageUrl(r.page_slug)}">
              <div class="recent-title">${wikiCore.escapeHtml(r.page_title)}</div>
              <div class="recent-meta">${wikiCore.escapeHtml(r.editor)} · ${wikiCore.formatDate(r.created_at)}</div>
            </a>
          `).join("");
        }

        // ===== CONTEÚDO PRINCIPAL =====
        // Se há busca (?q=), mostra resultados de busca
        if (q && data.results) {
          document.getElementById("search-results").classList.remove("hidden");
          const list = document.getElementById("search-results-list");
          document.getElementById("content-title").textContent = `Resultados: "${q}"`;
          document.getElementById("content-count").textContent = `${data.results.length} encontrado(s)`;
          if (!data.results.length) {
            list.innerHTML = `<div class="alert alert-info">Nenhuma página encontrada.</div>`;
          } else {
            list.innerHTML = data.results.map(p => `
              <a class="page-list-item" href="${wikiCore.pageUrl(p.slug)}">
                <div class="title">${wikiCore.escapeHtml(p.title)}</div>
                <div class="meta">${wikiCore.escapeHtml(p.category)} · ${wikiCore.formatDate(p.updated_at)}</div>
              </a>
            `).join("");
          }
          // Esconde lista normal durante busca
          document.getElementById("pages-list").classList.add("hidden");
        } else {
          renderPages();
        }

        // ---- Render da lista de páginas (filtrada por categoria) ----
        function renderPages() {
          const pagesEl = document.getElementById("pages-list");
          let pages = allPages;
          if (activeCategory) {
            pages = pages.filter(p => p.category === activeCategory);
            document.getElementById("content-title").textContent = activeCategory;
          } else {
            document.getElementById("content-title").textContent = "Todas as páginas";
          }
          document.getElementById("content-count").textContent = `${pages.length} página(s)`;

          if (!pages.length) {
            pagesEl.innerHTML = `<div class="muted text-sm" style="padding: var(--space-3)">Nenhuma página ${activeCategory ? "nesta categoria" : "ainda"}.</div>`;
          } else {
            pagesEl.innerHTML = pages.map(p => `
              <a class="page-list-item" href="${wikiCore.pageUrl(p.slug)}">
                <div class="title">${wikiCore.escapeHtml(p.title)}</div>
                <div class="meta">${wikiCore.escapeHtml(p.category)} · por ${wikiCore.escapeHtml(p.author)} · ${wikiCore.formatDate(p.updated_at)}</div>
              </a>
            `).join("");
          }
          pagesEl.classList.remove("hidden");
        }

      } catch (e) {
        document.getElementById("pages-list").innerHTML = `<div class="alert alert-error">Erro: ${wikiCore.escapeHtml(e.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
