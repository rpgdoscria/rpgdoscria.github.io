<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar — Rpg dos Cria</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="../css/style.css?v=202607232121">
  <link rel="stylesheet" href="../css/theme-custom.css?v=202607232121">
  <link rel="stylesheet" href="css/wiki-style.css?v=202607232121">
</head>
<body>
  <div id="header-mount"></div>

  <main class="container full">
    <div id="alert-mount"></div>
    <form id="edit-form">
      <div class="grid-2 mb-4">
        <div class="field">
          <label for="title">Título</label>
          <input type="text" id="title" required>
        </div>
        <div class="field">
          <label for="category">Categoria</label>
          <select id="category"></select>
        </div>
      </div>
      <div class="field">
        <label>Conteúdo (Markdown)</label>
        <div class="editor-split">
          <div class="editor-pane">
            <div class="pane-header"><span>Markdown</span></div>
            <textarea id="content" placeholder="Escreva em Markdown… use [[Nome da Página]] para links internos."></textarea>
          </div>
          <div class="editor-pane">
            <div class="pane-header">Pré-visualização</div>
            <div class="preview prose wiki-editor-preview" id="preview"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label for="comment">Comentário da edição (opcional)</label>
        <input type="text" id="comment" placeholder="Ex.: adicionada seção de histórico.">
      </div>
      <div class="flex gap-3">
        <button type="submit" class="btn btn-primary" id="save-btn">Salvar página</button>
        <a class="btn btn-ghost" id="cancel-btn" href="index.html">Cancelar</a>
      </div>
    </form>
  </main>

  <script src="../vendor/marked.min.js"></script>
  <script src="../vendor/purify.min.js"></script>
  <script src="../js/config.js?v=202607232121"></script>
  <script src="../js/api.js?v=202607232121"></script>
  <script src="../js/auth.js?v=202607232121"></script>
  <script src="../js/markdown.js?v=202607232121"></script>
  <script src="../js/wiki/wiki-core.js?v=202607232121"></script>
  <script>
    (async function () {
      window.auth.mountHeader("#header-mount", "wiki");
      const sess = window.auth.requireAuth("editor");
      if (!sess) return;

      const params = new URLSearchParams(location.search);
      const slug = params.get("slug");
      const isNew = params.get("new") === "true";
      const presetTitle = params.get("title");
      let originalSlug = null;
      let knownSlugs = new Set();

      function escapeHtml(s) { return wikiCore.escapeHtml(s); }
      function showAlert(type, msg) { document.getElementById("alert-mount").innerHTML = `<div class="alert alert-${type}">${escapeHtml(msg)}</div>`; }

      // Carrega categorias + slugs
      async function loadMeta() {
        try {
          const data = await window.api.get("/api/pages");
          const cats = data.categories || wikiCore.DEFAULT_CATEGORIES;
          const allCats = cats.length > 0 ? cats : wikiCore.DEFAULT_CATEGORIES;
          document.getElementById("category").innerHTML = allCats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
          (data.pages || []).forEach(p => knownSlugs.add(p.slug));
        } catch { document.getElementById("category").innerHTML = wikiCore.DEFAULT_CATEGORIES.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join(""); }
      }

      async function loadPage() {
        if (!slug) {
          if (presetTitle) document.getElementById("title").value = presetTitle;
          document.getElementById("category").value = "Lore/História";
          return;
        }
        try {
          const page = await window.api.get(`/api/pages/${encodeURIComponent(slug)}`);
          originalSlug = page.slug;
          document.getElementById("title").value = page.title;
          await loadMeta();
          const opt = Array.from(document.getElementById("category").options).find(o => o.value === page.category);
          if (opt) document.getElementById("category").value = page.category; else document.getElementById("category").value = "Lore/História";
          document.getElementById("content").value = page.content_md || "";
          document.getElementById("cancel-btn").href = wikiCore.pageUrl(page.slug);
          renderPreview();
        } catch (e) { showAlert("error", `Erro: ${e.message}`); }
      }

      function renderPreview() { document.getElementById("preview").innerHTML = window.md.render(document.getElementById("content").value, knownSlugs); }

      let debounce;
      document.getElementById("content").addEventListener("input", () => { clearTimeout(debounce); debounce = setTimeout(renderPreview, 200); });

      document.getElementById("edit-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = document.getElementById("title").value.trim();
        const category = document.getElementById("category").value;
        const content_md = document.getElementById("content").value;
        const comment = document.getElementById("comment").value.trim();
        if (!title) { showAlert("error", "Título é obrigatório."); return; }
        document.getElementById("save-btn").disabled = true;
        document.getElementById("save-btn").innerHTML = '<span class="spinner"></span> Salvando…';
        try {
          if (originalSlug) {
            await window.api.put(`/api/pages/${encodeURIComponent(originalSlug)}`, { title, category, content_md, comment });
            location.href = wikiCore.pageUrl(originalSlug);
          } else {
            const res = await window.api.post("/api/pages", { title, category, content_md, comment });
            location.href = wikiCore.pageUrl(res.slug);
          }
        } catch (e) { showAlert("error", e.message); document.getElementById("save-btn").disabled = false; document.getElementById("save-btn").textContent = "Salvar página"; }
      });

      await loadMeta();
      await loadPage();
      renderPreview();
    })();
  </script>
</body>
</html>
