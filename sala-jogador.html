<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sala do Jogador — Crônicas RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/theme-custom.css">
</head>
<body>
  <div id="header-mount"></div>

  <main class="sala-layout">
    <div class="sala-main">
      <div class="sala-header">
        <h1>Sala de Jogo</h1>
        <span class="room-code" id="room-code">-------</span>
        <span id="conn-mount"></span>
      </div>

      <div id="alert-mount"></div>

      <section>
        <h2 style="font-size: 18px; margin: 0 0 var(--space-3) 0;">Mesa</h2>
        <div id="characters-grid" class="characters-grid">
          <div class="muted text-sm">Aguardando conexão…</div>
        </div>
      </section>

      <section class="mt-6">
        <h2 style="font-size: 18px; margin: 0 0 var(--space-3) 0;">Inimigos</h2>
        <div id="enemies-grid" class="enemies-grid">
          <div class="muted text-sm">Nenhum inimigo ainda.</div>
        </div>
      </section>
    </div>

    <aside class="sala-side">
      <div class="side-panel">
        <h3>🎲 Dados</h3>
        <div class="dice-result-display" id="dice-result-display">Quando o mestre rolar dados, o resultado aparece aqui em destaque — todo mundo vê ao mesmo tempo.</div>
        <details class="mt-2">
          <summary class="text-xs muted">Minhas fórmulas</summary>
          <div id="presets-list" class="mt-2"></div>
          <div class="dice-formula-row mt-2">
            <input type="text" id="preset-label" placeholder="Label" style="font-size: 12px;">
            <input type="text" id="preset-formula" placeholder="1d20+5" style="font-size: 12px;">
            <button class="btn btn-sm" id="btn-save-preset">+</button>
          </div>
        </details>
        <div class="dice-formula-row mt-3">
          <input type="text" id="suggest-formula" placeholder="Sugerir fórmula pro mestre" style="font-size: 12px;">
          <input type="text" id="suggest-label" placeholder="Label" style="font-size: 12px;">
          <button class="btn btn-sm btn-primary" id="btn-suggest">Sugerir</button>
        </div>
        <div class="dice-formula-feedback" id="suggest-feedback"></div>
      </div>

      <div class="side-panel">
        <h3>📜 Histórico de rolagens</h3>
        <div id="dice-log" class="dice-log-list">
          <div class="muted text-sm">Nenhuma rolagem ainda.</div>
        </div>
      </div>
    </aside>
  </main>

  <!-- Modal de edição do próprio personagem -->
  <div id="character-modal" class="modal-backdrop hidden">
    <div class="modal-card">
      <h3 id="char-modal-title">Editar meu personagem</h3>
      <div class="field">
        <label>Nome</label>
        <input type="text" id="char-name">
      </div>
      <div class="grid-2">
        <div class="field">
          <label>HP atual</label>
          <input type="number" id="char-hp-current">
        </div>
        <div class="field">
          <label>HP máximo</label>
          <input type="number" id="char-hp-max">
        </div>
      </div>
      <div class="field">
        <label>Dinheiro</label>
        <input type="number" id="char-money">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="char-modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="char-modal-save">Salvar</button>
      </div>
    </div>
  </div>

  <script src="vendor/purify.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/room-ws.js"></script>
  <script src="js/dice-ui.js"></script>
  <script src="js/room-render.js"></script>
  <script src="js/character-render.js"></script>
  <script>
    (async function () {
      window.auth.mountHeader("#header-mount", "rooms");
      const sess = window.auth.requireAuth("viewer");
      if (!sess) return;

      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      if (!code) {
        document.getElementById("alert-mount").innerHTML = `<div class="alert alert-error">Código de sala ausente. Peça o código ao mestre.</div>`;
        return;
      }

      // Pede ao usuário que escolha um personagem (se ele tiver mais de um)
      let characterId = null;
      try {
        const data = await window.api.get("/api/rooms/characters");
        if (!data.characters || data.characters.length === 0) {
          document.getElementById("alert-mount").innerHTML = `<div class="alert alert-warning">Você ainda não tem personagens cadastrados. Crie um antes de entrar na sala.</div>`;
          return;
        }
        if (data.characters.length === 1) {
          characterId = data.characters[0].id;
        } else {
          // Mostra seleção
          const sel = data.characters.map(c => `${c.id}:${c.name}`).join(", ");
          const choice = prompt(`Você tem ${data.characters.length} personagens. Escolha um:\n\n${data.characters.map((c, i) => `${i + 1}. ${c.name} (HP ${c.hpCurrent}/${c.hpMax})`).join("\n")}\n\nDigite o número:`);
          const idx = parseInt(choice, 10) - 1;
          if (isNaN(idx) || idx < 0 || idx >= data.characters.length) {
            document.getElementById("alert-mount").innerHTML = `<div class="alert alert-error">Seleção inválida. Recarregue a página.</div>`;
            return;
          }
          characterId = data.characters[idx].id;
        }
      } catch (e) {
        document.getElementById("alert-mount").innerHTML = `<div class="alert alert-error">Erro: ${e.message}</div>`;
        return;
      }

      // Conecta ao RoomDO
      const client = new window.RoomClient(code, characterId);
      let currentState = null;

      client.onConnectivity = (status) => {
        document.getElementById("conn-mount").innerHTML = window.roomRender.renderConnectivity(status);
      };
      client.onStateChange = (state) => {
        if (!state) return;
        currentState = state;
        render(state);
      };
      client.onEvent = (msg) => {
        if (msg.type === "dice_result") {
          window.diceUI.flashDiceResult(
            document.getElementById("dice-result-display"),
            window.diceUI.formatResult(msg.payload)
          );
        } else if (msg.type === "room_closed") {
          document.getElementById("alert-mount").innerHTML = `<div class="alert alert-warning">A sala foi encerrada pelo mestre.</div>`;
        }
      };

      client.connect();

      function render(state) {
        document.getElementById("room-code").textContent = state.code;

        // Personagens — próprio é editável, outros são leitura
        const cg = document.getElementById("characters-grid");
        if (!state.characters || state.characters.length === 0) {
          cg.innerHTML = `<div class="muted text-sm">Ninguém na sala ainda.</div>`;
        } else {
          cg.innerHTML = state.characters.map(ch => {
            const isOwn = ch.id === characterId;
            return window.characterRender.renderCharacterCard(ch, {
              editable: isOwn,
              isMaster: false,
              isOwn,
            });
          }).join("");
        }

        // Inimigos — leitura
        const eg = document.getElementById("enemies-grid");
        if (!state.enemies || state.enemies.length === 0) {
          eg.innerHTML = `<div class="muted text-sm">Nenhum inimigo visível.</div>`;
        } else {
          eg.innerHTML = state.enemies.map(en => window.roomRender.renderEnemy(en, { isMaster: false })).join("");
        }

        // Log
        const dl = document.getElementById("dice-log");
        if (!state.diceLog || state.diceLog.length === 0) {
          dl.innerHTML = `<div class="muted text-sm">Nenhuma rolagem ainda.</div>`;
        } else {
          dl.innerHTML = window.roomRender.renderDiceLog(state.diceLog);
        }

        // Bind botões
        // +/- nos stats (só do próprio personagem)
        document.querySelectorAll('button[data-stat-id][data-delta]').forEach(b => {
          b.addEventListener("click", () => {
            const card = b.closest("[data-character-id]");
            const cardCharId = Number(card.dataset.characterId);
            if (cardCharId !== characterId) return; // só próprio
            const statId = Number(b.dataset.statId);
            const delta = Number(b.dataset.delta);
            const statRow = b.closest("[data-stat-type]");
            const type = statRow.dataset.statType;
            const valuesEl = statRow.querySelector(".stat-bar-values, .stat-number-value");
            if (!valuesEl) return;
            const text = valuesEl.textContent || "";
            let cur = 0;
            if (type === "bar") { const m = text.match(/^(\d+)/); cur = m ? Number(m[1]) : 0; }
            else { cur = Number(text) || 0; }
            client.send("update_own_character", { statId, value: { current: cur + delta } });
          });
        });
        document.querySelectorAll('button[data-action="edit-character"]').forEach(b => {
          b.addEventListener("click", () => openCharacterModal(Number(b.dataset.characterId)));
        });
      }

      // ----- Modal do próprio personagem -----
      function openCharacterModal(id) {
        if (!currentState) return;
        const ch = currentState.characters.find(c => c.id === id);
        if (!ch) return;
        if (ch.id !== characterId) return; // segurança extra — só pode editar o próprio
        document.getElementById("char-modal-title").textContent = `Editar: ${ch.name}`;
        document.getElementById("char-name").value = ch.name;
        document.getElementById("char-hp-current").value = ch.hpCurrent;
        document.getElementById("char-hp-max").value = ch.hpMax;
        document.getElementById("char-money").value = ch.money;
        document.getElementById("character-modal").classList.remove("hidden");
      }
      document.getElementById("char-modal-cancel").addEventListener("click", () => {
        document.getElementById("character-modal").classList.add("hidden");
      });
      document.getElementById("char-modal-save").addEventListener("click", () => {
        client.send("update_own_character", {
          hpCurrent: parseInt(document.getElementById("char-hp-current").value, 10),
          hpMax: parseInt(document.getElementById("char-hp-max").value, 10),
          money: parseInt(document.getElementById("char-money").value, 10),
          name: document.getElementById("char-name").value.trim(),
        });
        document.getElementById("character-modal").classList.add("hidden");
      });

      // ----- Sugerir fórmula -----
      const suggestInput = document.getElementById("suggest-formula");
      const suggestLabel = document.getElementById("suggest-label");
      const suggestFb = document.getElementById("suggest-feedback");
      function updateSuggestFeedback() {
        const v = suggestInput.value.trim();
        if (!v) { suggestFb.textContent = ""; suggestFb.className = "dice-formula-feedback"; suggestInput.classList.remove("invalid"); return; }
        const r = window.diceUI.previewParse(v);
        if (r.ok) {
          suggestFb.textContent = "✓ Pronto para sugerir";
          suggestFb.className = "dice-formula-feedback valid";
          suggestInput.classList.remove("invalid");
        } else {
          suggestFb.textContent = "✗ " + r.error;
          suggestFb.className = "dice-formula-feedback invalid";
          suggestInput.classList.add("invalid");
        }
      }
      suggestInput.addEventListener("input", updateSuggestFeedback);
      document.getElementById("btn-suggest").addEventListener("click", () => {
        const formula = suggestInput.value.trim();
        const label = suggestLabel.value.trim();
        if (!formula || !label) {
          suggestFb.textContent = "Preencha fórmula e label.";
          suggestFb.className = "dice-formula-feedback invalid";
          return;
        }
        if (!window.diceUI.isValid(formula)) return;
        client.send("suggest_formula", { formula, label });
        suggestInput.value = "";
        suggestLabel.value = "";
        suggestFb.textContent = "✓ Sugestão enviada ao mestre!";
        suggestFb.className = "dice-formula-feedback valid";
        setTimeout(() => { suggestFb.textContent = ""; }, 3000);
      });

      // ----- Presets -----
      async function loadPresets() {
        try {
          const data = await window.api.get("/api/rooms/dice-presets");
          const pl = document.getElementById("presets-list");
          const mine = (data.presets || []).filter(p => p.owner_user_id === sess.user.id);
          if (mine.length === 0) {
            pl.innerHTML = `<div class="muted text-xs">Sem presets. Crie abaixo para sugerir rapidamente.</div>`;
            return;
          }
          pl.innerHTML = mine.map(p => `
            <div class="list-row" style="padding: 4px 0; border: none">
              <div>
                <div class="text-sm">${escapeHtml(p.label)}</div>
                <code class="text-xs">${escapeHtml(p.formula)}</code>
              </div>
              <div class="spacer"></div>
              <button class="btn btn-sm btn-ghost" data-preset-formula="${escapeHtml(p.formula)}" data-preset-label="${escapeHtml(p.label)}">Sugerir</button>
            </div>
          `).join("");
          pl.querySelectorAll('button[data-preset-formula]').forEach(b => {
            b.addEventListener("click", () => {
              client.send("suggest_formula", { formula: b.dataset.presetFormula, label: b.dataset.presetLabel });
              const fb = document.getElementById("suggest-feedback");
              fb.textContent = "✓ Sugestão enviada!";
              fb.className = "dice-formula-feedback valid";
              setTimeout(() => { fb.textContent = ""; }, 3000);
            });
          });
        } catch { /* ignore */ }
      }
      loadPresets();

      document.getElementById("btn-save-preset").addEventListener("click", async () => {
        const label = document.getElementById("preset-label").value.trim();
        const formula = document.getElementById("preset-formula").value.trim();
        if (!label || !formula) return;
        try {
          await window.api.post("/api/rooms/dice-presets", { label, formula, isPublic: true });
          document.getElementById("preset-label").value = "";
          document.getElementById("preset-formula").value = "";
          loadPresets();
        } catch (e) { alert(e.message); }
      });

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
      }
    })();
  </script>
</body>
</html>
